name: Build Desktop Installers

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/desktop-build.yml"
      - "assets/**"
      - "desktop/**"
      - "src/**"
      - "index.html"
      - "desktop-config.js"
      - "package.json"
      - "package-lock.json"
      - "README.md"
      - "RELEASE_NOTES.md"
      - "scripts/release-assets.mjs"
      - "tests/release-integrity.contract.test.mjs"

jobs:
  contract:
    name: Release integrity contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run test:release-contract

  windows:
    name: Windows installer
    needs: contract
    runs-on: windows-latest
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
      ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build public Windows packages
        run: npx --no-install electron-builder --win nsis portable --x64 --publish never --config.nsis.differentialPackage=false
      - name: Stage public Windows assets
        run: node scripts/release-assets.mjs prepare windows release
      - uses: actions/upload-artifact@v4
        with:
          name: vpbuddy-windows
          path: release/publish/*
          if-no-files-found: error

  macos:
    name: macOS installer
    needs: contract
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
      ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build public macOS packages
        run: npx --no-install electron-builder --mac dmg --x64 --arm64 --publish never --config.dmg.writeUpdateInfo=false
      - name: Stage public macOS assets
        run: node scripts/release-assets.mjs prepare macos release
      - uses: actions/upload-artifact@v4
        with:
          name: vpbuddy-macos
          path: release/publish/*
          if-no-files-found: error

  release:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - contract
      - windows
      - macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Verify public release assets
        run: npm run release:verify
      - name: Compose release metadata
        shell: bash
        run: |
          VERSION="$(node -p 'require("./package.json").version')"
          RELEASE_DATE="$(TZ=Asia/Shanghai date '+%Y-%m-%d')"
          echo "APP_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=VPBuddy v${VERSION} · ${RELEASE_DATE}" >> "$GITHUB_ENV"
      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.RELEASE_NAME }}
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            artifacts/vpbuddy-windows/VPBuddy-Setup-${{ env.APP_VERSION }}-x64.exe
            artifacts/vpbuddy-windows/VPBuddy-Portable-${{ env.APP_VERSION }}-x64.exe
            artifacts/vpbuddy-macos/VPBuddy-${{ env.APP_VERSION }}-mac-arm64.dmg
            artifacts/vpbuddy-macos/VPBuddy-${{ env.APP_VERSION }}-mac-x64.dmg
