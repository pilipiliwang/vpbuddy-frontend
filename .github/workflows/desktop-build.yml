name: Build Desktop Installers

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/desktop-build.yml"
      - "assets/**"
      - "desktop/**"
      - "src/**"
      - "index.html"
      - "desktop-config.js"
      - "package.json"
      - "package-lock.json"
      - "README.md"
      - "RELEASE_NOTES.md"
      - "scripts/release-assets.mjs"
      - "tests/release-integrity.contract.test.mjs"

jobs:
  contract:
    name: Release integrity contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run test:release-contract

  windows:
    name: Windows installer
    needs: contract
    runs-on: windows-latest
    env:
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
      ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build public Windows packages
        run: npx --no-install electron-builder --win nsis portable --x64 --publish never --config.nsis.differentialPackage=false
      - name: Stage public Windows assets
        run: node scripts/release-assets.mjs prepare windows release
      - uses: actions/upload-artifact@v4
        with:
          name: vpbuddy-windows
          path: release/publish/*
          if-no-files-found: error

  macos:
    name: macOS installer
    needs: contract
    runs-on: macos-latest
    env:
      CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
      ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Verify macOS signing credentials
        shell: bash
        run: |
          required=(CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY_BASE64 APPLE_API_KEY_ID APPLE_API_ISSUER)
          missing=()
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} )); then
            echo "Missing required GitHub Actions secrets: ${missing[*]}" >&2
            echo "Production macOS releases must be Developer ID signed and Apple-notarized." >&2
            exit 1
          fi
      - name: Prepare Apple notarization key
        shell: bash
        run: |
          apple_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_BASE64" | /usr/bin/base64 -D > "$apple_key_path"
          test -s "$apple_key_path"
          chmod 600 "$apple_key_path"
          echo "APPLE_API_KEY=$apple_key_path" >> "$GITHUB_ENV"
      - name: Build, sign and notarize public macOS packages
        run: npx --no-install electron-builder --mac dmg --x64 --arm64 --publish never --config.dmg.writeUpdateInfo=false --config.forceCodeSigning=true
      - name: Verify macOS signatures and notarization tickets
        shell: bash
        run: |
          apps=()
          while IFS= read -r -d '' app_path; do
            apps+=("$app_path")
          done < <(find release -type d -name 'VPBuddy.app' -print0)
          if [[ ${#apps[@]} -ne 2 ]]; then
            echo "Expected two architecture-specific VPBuddy.app bundles, found ${#apps[@]}." >&2
            exit 1
          fi
          for app_path in "${apps[@]}"; do
            codesign --verify --deep --strict --verbose=2 "$app_path"
            spctl --assess --verbose=2 --type execute "$app_path"
            xcrun stapler validate "$app_path"
          done
      - name: Stage public macOS assets
        run: node scripts/release-assets.mjs prepare macos release
      - uses: actions/upload-artifact@v4
        with:
          name: vpbuddy-macos
          path: release/publish/*
          if-no-files-found: error

  release:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - contract
      - windows
      - macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Verify public release assets
        run: npm run release:verify
      - name: Compose release metadata
        shell: bash
        run: |
          VERSION="$(node -p 'require("./package.json").version')"
          RELEASE_DATE="$(TZ=Asia/Shanghai date '+%Y-%m-%d')"
          echo "APP_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=VPBuddy v${VERSION} · ${RELEASE_DATE}" >> "$GITHUB_ENV"
      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.RELEASE_NAME }}
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            artifacts/vpbuddy-windows/VPBuddy-Setup-${{ env.APP_VERSION }}-x64.exe
            artifacts/vpbuddy-windows/VPBuddy-Portable-${{ env.APP_VERSION }}-x64.exe
            artifacts/vpbuddy-macos/VPBuddy-${{ env.APP_VERSION }}-mac-arm64.dmg
            artifacts/vpbuddy-macos/VPBuddy-${{ env.APP_VERSION }}-mac-x64.dmg
